<script>
(function(){
var h = React.createElement;

var COLORS = ["#6366f1","#ef4444","#10b981","#f59e0b","#06b6d4","#8b5cf6","#ec4899","#84cc16","#f97316","#0ea5e9","#64748b","#facc15","#14b8a6"];
var HEADER_MAP = {
  "item id":"internal_id",
  "item":"sku",
  "description":"description",
  "dnr activity code":"dnr_activity_code",

  "last date purchased":"last_date_purchased",
  "buyer name":"buyer_name",
  "preferred vendor price":"preferred_vendor_price",
  "extended cost":"extended_cost",
  "product category":"product_category"
};
var STRIP_COLS = ["item sales rep","sales rep","item sales representative"];
var REQUIRED_COLS = ["sku","description","buyer_name","vendor_name","total_inventory_on_hand","extended_cost"];

function fmtUSD(n){return new Intl.NumberFormat('en-US',{style:'currency',currency:'USD',minimumFractionDigits:2,maximumFractionDigits:2}).format(Number(n||0));}
function fmtUSDRound(n){return new Intl.NumberFormat('en-US',{style:'currency',currency:'USD',maximumFractionDigits:0}).format(Number(n||0));}
function fmtNum(n){return new Intl.NumberFormat('en-US').format(Number(n||0));}
function daysAgo(d){if(!d)return null; var t=new Date(d).getTime(); if(isNaN(t))return null; return Math.floor((Date.now()-t)/86400000);}
function slug(s){return String(s||"").toLowerCase().replace(/[^a-z0-9]+/g,"-").replace(/^-|-$/g,"");}
function groupBy(arr,key){return arr.reduce(function(a,x){var k=x[key]||"—";(a[k]=a[k]||[]).push(x);return a;},{});}
function uid(){return crypto.randomUUID?crypto.randomUUID():Math.random().toString(36).slice(2);}
function normName(s){return String(s==null?"":s).trim().replace(/\s+/g," ");}
function isBlank(v){if(v==null) return true; var t=String(v).trim().toLowerCase(); return t===""||t==="n/a"||t==="null"||t==="undefined";}
function parseNum(v){if(isBlank(v)) return null; var n=parseFloat(String(v).replace(/[^0-9.\-]/g,"")); return isNaN(n)?null:n;}
function parseInt2(v){if(isBlank(v)) return null; var n=parseInt(String(v).replace(/[^0-9\-]/g,""),10); return isNaN(n)?null:n;}
function parseDate(v){if(isBlank(v)) return null; if(v instanceof Date) return v.toISOString().slice(0,10); var d=new Date(v); if(isNaN(d.getTime())) return null; return d.toISOString().slice(0,10);}

function normalizeRow(rowObj, fields){
  var out = {id:uid(),internal_id:"",sku:"",description:"",dnr_activity_code:"",vendor_item_number:"",vendor_name:"",last_date_sold:null,total_inventory_on_hand:0,last_date_purchased:null,buyer_name:"",preferred_vendor_price:0,extended_cost:0,product_category:"",po_number:"",po_status:"needs_po",po_date_assigned:null,notes:"",created_at:new Date().toISOString(),updated_at:new Date().toISOString()};
  fields.forEach(function(f){
    var key = HEADER_MAP[String(f).trim().toLowerCase()];
    if(!key) return;
    var val = rowObj[f];
    if(key==="extended_cost"||key==="preferred_vendor_price"){ out[key] = parseNum(val) || 0; }
    else if(key==="total_inventory_on_hand"){ out[key] = parseInt2(val) || 0; }
    else if(key==="last_date_sold"||key==="last_date_purchased"){ out[key] = parseDate(val); }
    else if(key==="buyer_name"||key==="vendor_name"){ out[key] = normName(val); }
    else if(key==="sku"||key==="internal_id"||key==="vendor_item_number"){ out[key] = String(val==null?"":val).trim(); }
    else { out[key] = isBlank(val) ? "" : String(val).trim(); }
  });
  if(!out.sku && out.internal_id) out.sku = out.internal_id;
  if(!out.extended_cost && out.preferred_vendor_price && out.total_inventory_on_hand){ out.extended_cost = +(out.preferred_vendor_price * out.total_inventory_on_hand).toFixed(2); }
  return out;
}

var DEFAULT_EMAIL = {subject:"Dead Inventory Return Request - {{vendor}} - PO {{po}}", body:"Hi {{vendor}},\n\nPlease find below the dead inventory items we'd like to return. Each SKU includes its associated PO number for your reference.\n\nLet me know if you need anything else to process these returns.\n\nThanks,\n{{user}}\nAcme Paper and Supply Co."};
var DEFAULT_BRANDING = {company:"Acme Paper and Supply Co.",primary:"#4f46e5",accent:"#ef4444"};
var DEFAULT_PROFILE = {name:"Damola Akinyemi",email:"dakinyemi@acmepaper.com",role:"Supply Chain Analyst"};
var LS = {get:function(k,fb){try{var v=localStorage.getItem(k);return v?JSON.parse(v):fb;}catch(e){return fb;}},set:function(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}};

function BarChartSVG(props){
  var data=props.data, color=props.color||"#4f46e5", height=props.height||240;
  if(!data||data.length===0) return h('div',{className:"text-sm text-slate-500 py-8 text-center"},"No data");
  var max=Math.max.apply(null,data.map(function(d){return d.value;}))||1;
  var pad={top:10,right:10,bottom:60,left:60}; var w=600,iw=w-pad.left-pad.right,ih=height-pad.top-pad.bottom;
  var slot=iw/data.length, barW=slot*0.7;
  var children=[];
  [0,0.25,0.5,0.75,1].forEach(function(t,i){children.push(h('line',{key:"g"+i,x1:pad.left,x2:w-pad.right,y1:pad.top+ih*(1-t),y2:pad.top+ih*(1-t),stroke:"#e2e8f0",strokeDasharray:"3 3"}));});
  data.forEach(function(d,i){
    var bh=(d.value/max)*ih, x=pad.left+i*slot+(slot-barW)/2, y=pad.top+ih-bh;
    var lx=x+barW/2, ly=height-pad.bottom+14;
    children.push(h('g',{key:i},
      h('rect',{x:x,y:y,width:barW,height:bh,fill:color,rx:3},h('title',null,d.name+": "+fmtUSDRound(d.value))),
      h('text',{x:lx,y:ly,fontSize:9,textAnchor:"end",transform:"rotate(-35, "+lx+", "+ly+")",fill:"#64748b"},String(d.name).substring(0,18))
    ));
  });
  [0,0.5,1].forEach(function(t,i){children.push(h('text',{key:"y"+i,x:pad.left-6,y:pad.top+ih*(1-t)+3,fontSize:10,textAnchor:"end",fill:"#94a3b8"},fmtUSDRound(max*t)));});
  return h('svg',{viewBox:"0 0 "+w+" "+height,className:"w-full",style:{height:height,maxHeight:height},preserveAspectRatio:"xMidYMid meet"},children);
}

function PieChartSVG(props){
  var data=props.data, height=props.height||240;
  if(!data||data.length===0) return h('div',{className:"text-sm text-slate-500 py-8 text-center"},"No data");
  var total=data.reduce(function(s,d){return s+d.value;},0)||1;
  var cx=120,cy=120,r=90,acc=0;
  var slices=data.map(function(d,i){
    var sa=(acc/total)*Math.PI*2-Math.PI/2; acc+=d.value;
    var ea=(acc/total)*Math.PI*2-Math.PI/2;
    var large=ea-sa>Math.PI?1:0;
    var x1=cx+r*Math.cos(sa),y1=cy+r*Math.sin(sa),x2=cx+r*Math.cos(ea),y2=cy+r*Math.sin(ea);
    return {path:"M "+cx+" "+cy+" L "+x1+" "+y1+" A "+r+" "+r+" 0 "+large+" 1 "+x2+" "+y2+" Z",color:COLORS[i%COLORS.length],name:d.name,value:d.value,pct:Math.round(100*d.value/total)};
  });
  var svgChildren=slices.map(function(s,i){return h('path',{key:i,d:s.path,fill:s.color},h('title',null,s.name+": "+s.value+" ("+s.pct+"%)"));});
  svgChildren.push(h('circle',{key:"hole",cx:120,cy:120,r:42,fill:"white",className:"dark:fill-slate-800"}));
  svgChildren.push(h('text',{key:"tl",x:120,y:116,textAnchor:"middle",fontSize:10,fill:"#94a3b8"},"TOTAL"));
  svgChildren.push(h('text',{key:"tv",x:120,y:134,textAnchor:"middle",fontSize:18,fontWeight:"bold",fill:"#1e293b",className:"dark:fill-white"},String(total)));
  var legend=slices.map(function(s,i){
    return h('div',{key:i,className:"flex items-center gap-2"},
      h('span',{className:"inline-block w-3 h-3 rounded-sm",style:{background:s.color}}),
      h('span',{className:"flex-1 truncate"},s.name),
      h('span',{className:"text-slate-500 dark:text-slate-400 tabular-nums"},s.value+" ("+s.pct+"%)")
    );
  });
  return h('div',{className:"flex items-center gap-4",style:{height:height}},
    h('svg',{viewBox:"0 0 240 240",className:"flex-shrink-0",style:{width:height,height:height}},svgChildren),
    h('div',{className:"flex-1 overflow-auto text-xs space-y-1.5",style:{maxHeight:height}},legend)
  );
}

function LineChartSVG(props){
  var data=props.data, color=props.color||"#10b981", height=props.height||240;
  if(!data||data.length===0) return h('div',{className:"text-sm text-slate-500 py-8 text-center"},"No data");
  var max=Math.max.apply(null,data.map(function(d){return d.value;}))||1;
  var pad={top:10,right:20,bottom:35,left:40}, w=600, iw=w-pad.left-pad.right, ih=height-pad.top-pad.bottom;
  var pts=data.map(function(d,i){return {x:pad.left+(data.length===1?iw/2:(i/(data.length-1))*iw),y:pad.top+ih-(d.value/max)*ih,d:d};});
  var path=pts.map(function(p,i){return (i===0?'M':'L')+' '+p.x+' '+p.y;}).join(' ');
  var areaPath=path+" L "+pts[pts.length-1].x+" "+(pad.top+ih)+" L "+pts[0].x+" "+(pad.top+ih)+" Z";
  var children=[h('defs',{key:"d"},h('linearGradient',{id:"lineFill",x1:"0",x2:"0",y1:"0",y2:"1"},h('stop',{offset:"0%",stopColor:color,stopOpacity:"0.25"}),h('stop',{offset:"100%",stopColor:color,stopOpacity:"0"})))];
  [0,0.25,0.5,0.75,1].forEach(function(t,i){children.push(h('line',{key:"g"+i,x1:pad.left,x2:w-pad.right,y1:pad.top+ih*(1-t),y2:pad.top+ih*(1-t),stroke:"#e2e8f0",strokeDasharray:"3 3"}));});
  children.push(h('path',{key:"a",d:areaPath,fill:"url(#lineFill)"}));
  children.push(h('path',{key:"p",d:path,fill:"none",stroke:color,strokeWidth:2.5}));
  pts.forEach(function(p,i){children.push(h('circle',{key:"c"+i,cx:p.x,cy:p.y,r:4,fill:"#4f46e5",stroke:"white",strokeWidth:2},h('title',null,p.d.name+": "+p.d.value)));});
  pts.forEach(function(p,i){children.push(h('text',{key:"t"+i,x:p.x,y:height-pad.bottom+14,fontSize:10,textAnchor:"middle",fill:"#64748b"},p.d.name));});
  [0,0.5,1].forEach(function(t,i){children.push(h('text',{key:"y"+i,x:pad.left-6,y:pad.top+ih*(1-t)+3,fontSize:10,textAnchor:"end",fill:"#94a3b8"},Math.round(max*t)));});
  return h('svg',{viewBox:"0 0 "+w+" "+height,className:"w-full",style:{height:height},preserveAspectRatio:"xMidYMid meet"},children);
}

var AppCtx = createContext(null);
function useApp(){return useContext(AppCtx);}
function useHash(){
  var st=useState(function(){return window.location.hash||"#/dashboard";});
  var hash=st[0], setHash=st[1];
  useEffect(function(){
    function onH(){setHash(window.location.hash||"#/dashboard");}
    window.addEventListener('hashchange',onH);
    if(!window.location.hash) window.location.hash="#/dashboard";
    return function(){window.removeEventListener('hashchange',onH);};
  },[]);
  return hash;
}
function go(p){window.location.hash=p;}

function AppProvider(props){
  var invS=useState(function(){return LS.get("dim_v3_inventory",[]);}); var inventory=invS[0], setInventoryState=invS[1];
  var venS=useState(function(){return LS.get("dim_v3_vendors",[]);}); var vendors=venS[0], setVendorsState=venS[1];
  var upS=useState(function(){return LS.get("dim_v3_uploads",[]);}); var uploads=upS[0], setUploadsState=upS[1];
  var prS=useState(function(){return LS.get("dim_v3_profile",DEFAULT_PROFILE);}); var profile=prS[0], setProfileState=prS[1];
  var brS=useState(function(){return LS.get("dim_v3_branding",DEFAULT_BRANDING);}); var branding=brS[0], setBrandingState=brS[1];
  var emS=useState(function(){return LS.get("dim_v3_email_tpl",DEFAULT_EMAIL);}); var emailTemplate=emS[0], setEmailTplState=emS[1];
  var thS=useState(function(){return LS.get("dim_v3_theme","light");}); var theme=thS[0], setTheme=thS[1];
  var tS=useState([]); var toasts=tS[0], setToasts=tS[1];
  var sS=useState(""); var searchGlobal=sS[0], setSearchGlobal=sS[1];
  function setInventory(v){setInventoryState(v); LS.set("dim_v3_inventory",v);}
  function setVendors(v){setVendorsState(v); LS.set("dim_v3_vendors",v);}
  function setUploads(v){setUploadsState(v); LS.set("dim_v3_uploads",v);}
  function setProfile(v){setProfileState(v); LS.set("dim_v3_profile",v);}
  function setBranding(v){setBrandingState(v); LS.set("dim_v3_branding",v);}
  function setEmailTemplate(v){setEmailTplState(v); LS.set("dim_v3_email_tpl",v);}
  useEffect(function(){LS.set("dim_v3_theme",theme); document.documentElement.classList.toggle("dark",theme==="dark");},[theme]);
  var pushToast=useCallback(function(t){var id=uid(); setToasts(function(ts){return ts.concat([Object.assign({id:id},t)]);}); setTimeout(function(){setToasts(function(ts){return ts.filter(function(x){return x.id!==id;});});},3500);},[]);
  function dismissToast(id){setToasts(function(ts){return ts.filter(function(x){return x.id!==id;});});}
  function toggleTheme(){setTheme(function(t){return t==="dark"?"light":"dark";});}
  function syncVendorsFromInventory(inv){
    var existing = {};
    vendors.forEach(function(v){existing[v.vendor_name]=v;});
    var names = Array.from(new Set(inv.map(function(r){return r.vendor_name;}).filter(Boolean)));
    var merged = names.map(function(n){
      if(existing[n]) return existing[n];
      return {id:uid(), vendor_name:n, contact_email:"", contact_name:"", phone:""};
    });
    vendors.forEach(function(v){
      if(names.indexOf(v.vendor_name)<0 && (v.contact_email||v.contact_name||v.phone)) merged.push(v);
    });
    setVendors(merged);
  }
  var value={inventory:inventory,setInventory:setInventory,vendors:vendors,setVendors:setVendors,uploads:uploads,setUploads:setUploads,profile:profile,setProfile:setProfile,branding:branding,setBranding:setBranding,emailTemplate:emailTemplate,setEmailTemplate:setEmailTemplate,theme:theme,toggleTheme:toggleTheme,pushToast:pushToast,toasts:toasts,dismissToast:dismissToast,searchGlobal:searchGlobal,setSearchGlobal:setSearchGlobal,syncVendorsFromInventory:syncVendorsFromInventory};
  return h(AppCtx.Provider,{value:value},props.children);
}

function Toasts(){
  var ctx=useApp();
  return h('div',{className:"fixed top-4 right-4 z-50 space-y-2"},
    ctx.toasts.map(function(t){
      return h('div',{key:t.id,className:"min-w-[240px] max-w-sm shadow-lg rounded-lg px-4 py-3 flex items-start gap-3 text-sm "+(t.type==='success'?'bg-emerald-600 text-white':t.type==='error'?'bg-accent-600 text-white':t.type==='warning'?'bg-amber-500 text-white':'bg-slate-800 text-white')},
        h('span',{className:"font-bold"},t.type==='success'?'\u2713':t.type==='error'?'!':t.type==='warning'?'\u26a0\ufe0f':'i'),
        h('span',{className:"flex-1"},t.message),
        h('button',{onClick:function(){ctx.dismissToast(t.id);},className:"opacity-70 hover:opacity-100"},'\u00d7')
      );
    })
  );
}

function Btn(props){
  var v=props.variant||'primary';
  var cls = v==='primary' ? 'bg-brand-600 hover:bg-brand-700 text-white shadow-sm border border-brand-700' :
            v==='red' ? 'bg-accent-600 hover:bg-accent-700 text-white shadow-sm border border-accent-700' :
            v==='ghost' ? 'bg-transparent hover:bg-slate-100 dark:hover:bg-slate-700 text-slate-700 dark:text-slate-200' :

function parseHashQuery(hash){
  var q = (hash.split('?')[1]||'');
  var out = {};
  q.split('&').forEach(function(p){if(!p) return; var kv=p.split('='); out[decodeURIComponent(kv[0])]=decodeURIComponent(kv[1]||'');});
  return out;
}

function UploadPage(){
  var ctx=useApp();
  var pv=useState(null); var preview=pv[0],setPreview=pv[1];
  var fn=useState(""); var filename=fn[0],setFilename=fn[1];
  var cf=useState(null); var confirmed=cf[0],setConfirmed=cf[1];
  var dg=useState(false); var dragOver=dg[0],setDragOver=dg[1];
  var bs=useState(false); var busy=bs[0],setBusy=bs[1];
  var inputRef=useRef(null);
  function validateAndCheck(rows, fieldsRaw){
    var fieldKeys = fieldsRaw.map(function(f){return HEADER_MAP[String(f).trim().toLowerCase()];}).filter(Boolean);
    var missingCols = REQUIRED_COLS.filter(function(c){return fieldKeys.indexOf(c)<0;});
    var hasPreferred = fieldKeys.indexOf("vendor_name")>=0;
    var hasItemVendor = fieldKeys.indexOf("vendor_item_number")>=0;
    var vendorFallbackUsed = false;
    if(!hasPreferred && hasItemVendor){
      rows.forEach(function(r){if(!r.vendor_name && r.vendor_item_number) r.vendor_name = r.vendor_item_number;});
      vendorFallbackUsed = true;
    }
    return {missingCols:missingCols, vendorFallbackUsed:vendorFallbackUsed};
  }
  function handleCSVorTSV(file,isTSV){
    window.Papa.parse(file,{header:true,skipEmptyLines:true,delimiter:isTSV?"\t":"",
      complete:function(res){
        var fields=(res.meta.fields||[]).slice();
        var stripped=[];
        fields=fields.filter(function(f){var k=String(f||"").trim().toLowerCase(); if(STRIP_COLS.indexOf(k)>=0){stripped.push(f); return false;} return true;});
        var rows=res.data.map(function(r){return normalizeRow(r,fields);}).filter(function(r){return r.sku||r.description;});
        var check = validateAndCheck(rows, fields);
        setPreview({rows:rows,fields:fields,stripped:stripped,raw:res.data.length,format:isTSV?"TSV":"CSV",missingCols:check.missingCols,vendorFallbackUsed:check.vendorFallbackUsed});
        setBusy(false);
      },
      error:function(err){ctx.pushToast({type:"error",message:"Parse error: "+err.message}); setBusy(false);}
    });
  }
  function handleExcel(file){
    var reader=new FileReader();
    reader.onload=function(ev){
      try{
        var data=new Uint8Array(ev.target.result);
        var wb=XLSX.read(data,{type:'array',cellDates:true});
        var sheetNames=wb.SheetNames;
        var ws=wb.Sheets[sheetNames[0]];
        var aoa=XLSX.utils.sheet_to_json(ws,{header:1,defval:""});
        if(aoa.length===0){ctx.pushToast({type:"error",message:"Empty workbook"}); setBusy(false); return;}
        var rawHeaders=aoa[0].map(function(hd){return String(hd==null?"":hd);});
        var stripped=[]; var keepIdx=[];
        rawHeaders.forEach(function(hd,idx){
          if(STRIP_COLS.indexOf(hd.trim().toLowerCase())>=0) stripped.push(hd);
          else keepIdx.push(idx);
        });
        var fields=keepIdx.map(function(i){return rawHeaders[i];});
        var dataRows=aoa.slice(1).filter(function(r){return r && r.some(function(c){return c!==""&&c!=null;});});
        var rows=dataRows.map(function(arr){
          var obj={};
          keepIdx.forEach(function(i){obj[rawHeaders[i]]=arr[i];});
          return normalizeRow(obj,fields);
        }).filter(function(r){return r.sku||r.description;});
        var sheetNote=sheetNames.length>1?"Multiple sheets — using first: "+sheetNames[0]:"";
        var check = validateAndCheck(rows, fields);
        setPreview({rows:rows,fields:fields,stripped:stripped,raw:dataRows.length,format:"Excel",sheetNote:sheetNote,missingCols:check.missingCols,vendorFallbackUsed:check.vendorFallbackUsed});
        setBusy(false);
      }catch(err){ctx.pushToast({type:"error",message:"Excel parse error: "+err.message}); setBusy(false);}
    };
    reader.onerror=function(){ctx.pushToast({type:"error",message:"File read failed"}); setBusy(false);};
    reader.readAsArrayBuffer(file);
  }
  function handleJSON(file){
    var reader=new FileReader();
    reader.onload=function(ev){
      try{
        var parsed=JSON.parse(ev.target.result);
        if(!Array.isArray(parsed)){
          if(parsed.rows && Array.isArray(parsed.rows)) parsed=parsed.rows;
          else if(parsed.data && Array.isArray(parsed.data)) parsed=parsed.data;
          else if(parsed.inventory && Array.isArray(parsed.inventory)) parsed=parsed.inventory;
          else {ctx.pushToast({type:"error",message:"JSON must be an array of objects"}); setBusy(false); return;}
        }
        if(parsed.length===0){ctx.pushToast({type:"error",message:"JSON array is empty"}); setBusy(false); return;}
        var allKeys=new Set();
        parsed.forEach(function(o){if(o&&typeof o==='object') Object.keys(o).forEach(function(k){allKeys.add(k);});});
        var fields=Array.from(allKeys);
        var stripped=[];
        fields=fields.filter(function(f){var k=String(f||"").trim().toLowerCase(); if(STRIP_COLS.indexOf(k)>=0){stripped.push(f); return false;} return true;});

                h('td',{className:"px-3 py-1.5 text-center text-xs tabular-nums"},skuCount)

try {
  ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));

}

</script>
<script>
(function(){
  try {
    var saved = JSON.parse(localStorage.getItem("dim_v3_theme")) || "light";
    if (saved === "dark") document.documentElement.classList.add("dark");
  } catch(e){}
  function setTheme(mode){
    if (mode === "dark") document.documentElement.classList.add("dark");
    else document.documentElement.classList.remove("dark");
    try { localStorage.setItem("dim_v3_theme", JSON.stringify(mode)); } catch(e){}
    window.dispatchEvent(new HashChangeEvent("hashchange"));
    refreshBtn();
  }
  window.__dimToggleTheme = function(){
    setTheme(document.documentElement.classList.contains("dark") ? "light" : "dark");
  };
  function refreshBtn(){
    var btn = document.getElementById("dim-theme-btn");
    if (!btn) return;
    var isDark = document.documentElement.classList.contains("dark");
    btn.innerHTML = isDark ? "☀️&nbsp;Light mode" : "🌙&nbsp;Dark mode";
  }
  function installBtn(){
    var orig = document.querySelector('button[title="Toggle theme"]');
    if (!orig || document.getElementById("dim-theme-btn")) return;
    var btn = document.createElement("button");
    btn.id = "dim-theme-btn";
    btn.type = "button";
    btn.addEventListener("click", window.__dimToggleTheme);
    orig.parentNode.insertBefore(btn, orig);
    orig.style.display = "none";
    refreshBtn();
  }
  var tries = 0;
  var iv = setInterval(function(){
    installBtn();
    tries++;
    if (tries > 120) clearInterval(iv);
  }, 500);
  if (window.MutationObserver) {
    new MutationObserver(installBtn).observe(document.body, { childList: true, subtree: true });
  }
})();
</script>
